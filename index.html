<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>happy birthday jude ❤️</title>
<style>
:root{
--bg:#0f0c10;
--pink:#ffb6c1;
--text:#fff;
--glass:rgba(255,255,255,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
overflow:hidden;
}
.slide{
display:none;
height:100vh;
padding:20px;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}
.slide.active{display:flex}
.card{
max-width:900px;
padding:40px;
border-radius:24px;
background:var(--glass);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.1);
}
h1,h2{color:var(--pink);margin-bottom:20px}
button{
padding:12px 28px;
border:none;
border-radius:999px;
background:var(--pink);
margin-top:20px;
cursor:pointer;
}
.typewriter{
font-size:1.1rem;
line-height:1.8;
min-height:120px;
}
.memory-container{
display:flex;
align-items:center;
gap:20px;
max-width:1100px;
width:100%;
}
.memory-container img{
max-width:800px;
max-height:70vh;
width:auto;
height:auto;
border-radius:20px;
}
.memory-caption{
margin-top:15px;
padding:20px;
background:rgba(255,182,193,.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,182,193,.4);
border-radius:20px;
color:var(--pink);
}
.arrow{
font-size:40px;
cursor:pointer;
user-select:none;
}

#slide1{
position:relative;
overflow:hidden;
}
#slide1::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(rgba(15,12,16,.55),rgba(15,12,16,.55)),
url("cover.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
filter:blur(8px);
transform:scale(1.08);
z-index:-1;
}

</style>
</head>
<body>

<audio id="music" autoplay loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<section class="slide active" id="slide1">
<div class="card">
<h1>happy birthday jude ❤️</h1>
<p>a small gift from eyad</p>
<button onclick="startSite()">open my letter</button>
</div>
</section>

<section class="slide" id="slide2">
<div class="card">
<h2>to my love</h2>
<p class="typewriter" data-text="happy birthday to the best girl ive ever met n my entire life and the most beautiful one too i hope u have a happy life after 19 years of all this crazy bullshit n u have to live with me so we can celebrate your birthday together at our house ❤️❤️❤️"></p>
<button onclick="nextSlide()">next</button>
</div>
</section>

<section class="slide" id="slide3">
<div class="card">
<h2>how i love u</h2>
<p class="typewriter" data-text="i love u i really love u and im deeply in love with u literally every time i talk to u and every message i send reflects how much i love u."></p>
<button onclick="nextSlide()">next</button>
</div>
</section>

<section class="slide" id="slide4">
<div class="card">
<h2>our story</h2>
<p class="typewriter" data-text="صح ان حركاتي زمان للحين مضايقتك بس ابي ابدا قصة جديدة وحلوة معك لو تبين يعني المهم انزلي تحت شوفي كيف حنا كيوت"></p>
<button onclick="nextSlide()">our moments</button>
</div>
</section>

<section class="slide" id="slide5">
<h2>our moments ❤️</h2>
<div class="memory-container">
<div class="arrow" onclick="prevPhoto()">❮</div>

<div>
<img id="memoryImage" src="photo1.jpg">
<div id="memoryCaption" class="memory-caption">شوف كيف حنا كيوت</div>
</div>

<div class="arrow" onclick="nextPhoto()">❯</div>
</div>
</section>

<script>

function startSite(){
const music=document.getElementById("music");
music.play().catch(()=>{});
nextSlide();
}

const slides=document.querySelectorAll(".slide");
let currentSlide=0;

function nextSlide(){
slides[currentSlide].classList.remove("active");
currentSlide++;
slides[currentSlide].classList.add("active");

const target=slides[currentSlide].querySelector(".typewriter");
if(target && !target.dataset.done){
typeWriter(target);
target.dataset.done="1";
}
}

function typeWriter(el){
const text=el.dataset.text;
let i=0;
el.innerHTML="";
(function write(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(write,25);
}
})();
}

const photos=[
{img:"photo1.jpg",cap:"شوف كيف حنا كيوت"},
{img:"photo2.jpg",cap:"احب سعودية"},
{img:"photo3.jpg",cap:"شوف اول طقم لنا"},
{img:"photo4.jpg",cap:"تناقضنا"},
{img:"photo5.jpg",cap:"انا ايلون"},
{img:"photo6.jpg",cap:"البوست حقنا"},
{img:"photo7.jpg",cap:"شوف كيف لويال انا"},
{img:"photo8.jpg",cap:"خهخهخهخهخ"},
{img:"photo9.jpg",cap:"شوف كيف حابين بعض"},
{img:"photo10.jpg",cap:"😒😒"}
];

let photoIndex=0;

function updatePhoto(){
document.getElementById("memoryImage").src=photos[photoIndex].img;
document.getElementById("memoryCaption").innerText=photos[photoIndex].cap;
}

function nextPhoto(){
photoIndex=(photoIndex+1)%photos.length;
updatePhoto();
}

function prevPhoto(){
photoIndex=(photoIndex-1+photos.length)%photos.length;
updatePhoto();
}

window.addEventListener("load",()=>{
document.getElementById("music").play().catch(()=>{});
});
</script>

</body>
</html>
